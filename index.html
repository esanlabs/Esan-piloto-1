<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>ESAN - Trayectoria histórica</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script>
    // ========================================================
    // SHADER: AURORA SIN RAYA
    // ========================================================
    AFRAME.registerShader('aurora-sin-raya', {
      schema: {
        src: {type: 'map', is: 'uniform'},
        opacity: {type: 'number', is: 'uniform', default: 0.75}
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec2 vUv;
        uniform sampler2D src;
        uniform float opacity;
        void main() {
          float mask = smoothstep(0.0, 0.1, vUv.x) * smoothstep(1.0, 0.9, vUv.x);
          vec4 color = texture2D(src, vUv);
          gl_FragColor = vec4(color.rgb, color.a * opacity * mask);
        }
      `
    });

    // ========================================================
    // COMPONENTE THREE.JS: CUBOS VIVOS CON PREDOMINIO ROJO
    // ========================================================
    AFRAME.registerComponent('cubos-digitales', {
      init: function () {
        const scene3D = this.el.sceneEl.object3D;
        this.count = 1000; // Cantidad óptima y fluida para VR
        
        this.geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(this.count * 3);
        const colors = new Float32Array(this.count * 3);
        
        // Paleta de Colores
        const colorRojo = new THREE.Color(0xe3173e);    // Rojo institucional ESAN
        const colorCeleste = new THREE.Color(0x00bfff); // Celeste digital
        const colorBlanco = new THREE.Color(0xffffff);  // Blanco puro
        
        this.velocities = [];

        for (let i = 0; i < this.count; i++) {
          // Distribución en un entorno envolvente completo alrededor de la cámara
          positions[i * 3] = (Math.random() - 0.5) * 50;
          positions[i * 3 + 1] = (Math.random() - 0.5) * 40 + 1.6; // Centrado a la altura de los ojos en VR
          positions[i * 3 + 2] = (Math.random() - 0.5) * 50;
          
          // Ajuste de probabilidades: 50% de probabilidad de ser Rojo
          const rand = Math.random();
          let selectedColor;
          if (rand < 0.50) {
            selectedColor = colorRojo;       // Mayor densidad de cubos rojos
          } else if (rand < 0.75) {
            selectedColor = colorCeleste;    // 25% Celestes
          } else {
            selectedColor = colorBlanco;     // 25% Blancos
          }
          
          colors[i * 3] = selectedColor.r;
          colors[i * 3 + 1] = selectedColor.g;
          colors[i * 3 + 2] = selectedColor.b;

          // Velocidades de movimiento tridimensional continuo
          this.velocities.push((Math.random() - 0.5) * 0.02); // X
          this.velocities.push((Math.random() - 0.5) * 0.02); // Y
          this.velocities.push((Math.random() - 0.5) * 0.02); // Z
        }
        
        this.geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        this.geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        // Crear una textura blanca cuadrada en memoria para que responda a gl_PointSize correctamente
        const canvas = document.createElement('canvas');
        canvas.width = 16;
        canvas.height = 16;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, 16, 16);
        const texture = new THREE.CanvasTexture(canvas);

        // Se mantiene el tamaño chico y estético calibrado
        this.material = new THREE.PointsMaterial({
          size: 0.22,
          vertexColors: true,
          transparent: true,
          opacity: 0.9,
          map: texture,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        });
        
        this.particleSystem = new THREE.Points(this.geometry, this.material);
        scene3D.add(this.particleSystem);
      },
      
      // Ciclo de renderizado continuo (Garantiza el movimiento perpetuo)
      tick: function (time, timeDelta) {
        if (!this.particleSystem) return;
        
        const pos = this.geometry.attributes.position.array;
        
        // ANIMACIÓN DE TAMAÑO CHICO Y SUAVE:
        // El tamaño oscilará dinámicamente entre 0.12 y 0.28 de manera sutil para VR
        this.material.size = (Math.sin(time * 0.002) * 0.08) + 0.20;

        for (let i = 0; i < this.count; i++) {
          const i3 = i * 3;
          
          // Movimiento constante en los 3 ejes (Flotación por el espacio)
          pos[i3] += this.velocities[i3];
          pos[i3 + 1] += this.velocities[i3 + 1];
          pos[i3 + 2] += this.velocities[i3 + 2];
          
          // Límites espaciales (Efecto rebote para contener la galaxia de datos)
          if (Math.abs(pos[i3]) > 25) this.velocities[i3] *= -1;
          if (Math.abs(pos[i3 + 1] - 1.6) > 20) this.velocities[i3 + 1] *= -1;
          if (Math.abs(pos[i3 + 2]) > 25) this.velocities[i3 + 2] *= -1;
        }
        
        // Notificar a la GPU la actualización estructural
        this.geometry.attributes.position.needsUpdate = true;
        
        // Rotación general constante
        this.particleSystem.rotation.y += 0.0005;
        this.particleSystem.rotation.x += 0.0002;
      }
    });
  </script>
</head>

<body>
  <a-scene>
    <a-assets>
      <img id="esan360" src="patio.jpg">
      <video id="auroraVideo" src="aurora2.mp4" autoplay loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
      <video id="videoUni" src="video5.mp4" preload="auto" crossorigin="anonymous" playsinline webkit-playsinline></video>
    </a-assets>

    <a-sky src="#esan360" rotation="0 -90 0"></a-sky>
    
    <a-entity id="estrellas" cubos-digitales></a-entity>

    <a-sphere
      id="telonNegro"
      radius="60"
      material="color: #000; side: back; transparent: true; opacity: 0; shader: flat"
      animation__oscurecer="property: material.opacity; to: 1; dur: 2000; startEvents: cineStart"
      animation__aclarar="property: material.opacity; to: 0; dur: 2000; startEvents: cineEnd">
    </a-sphere>

    <a-videosphere
      id="auroraCielo"
      src="#auroraVideo"
      radius="59"
      visible="false"
      segments-width="64"
      segments-height="64"
      material="shader: aurora-sin-raya; transparent: true; opacity: 0.9; side: back">
    </a-videosphere>

    <a-entity id="grupoVideo" position="0 1.6 -4" visible="false">
      <a-video id="pantallaVideo" src="#videoUni" width="5" height="3"></a-video>
      <a-plane id="barraFondo" width="5" height="0.12" color="#696a6d" position="0 -1.6 0.01"></a-plane>
      <a-plane id="barraProgreso" width="0.01" height="0.12" color="#E3173E" position="-2.5 -1.6 0.02"></a-plane>
      <a-text id="textoDuracion" value="0:00 / 0:00" color="#FFFFFF" width="3" align="right" position="2.4 -1.48 0.10"></a-text>

      <a-entity id="controles" position="0 -1.9 0.1">
        <a-circle id="btnReset" class="clickable" color="#FFFFFF" radius="0.2" position="-1.2 0 0">
          <a-text value="Reiniciar" align="center" color="#000000" width="2"></a-text>
        </a-circle>
        <a-circle id="btnNormal" class="clickable" color="#FFFFFF" radius="0.2" position="-0.6 0 0">
          <a-text value="1x" align="center" color="#E3173E" width="2"></a-text>
        </a-circle>
        <a-circle id="btnPausa" class="clickable" color="#E3173E" radius="0.25" position="0 0 0">
          <a-text id="txtPausa" value="PAUSA" align="center" color="#FFFFFF" width="2"></a-text>
        </a-circle>
        <a-circle id="btnRapido" class="clickable" color="#FFFFFF" radius="0.2" position="0.6 0 0">
          <a-text value="2x >>" align="center" color="#E3173E" width="2"></a-text>
        </a-circle>
        <a-circle id="btnSalir" class="clickable" color="#E3173E" radius="0.2" position="1.3 0 0">
          <a-text value="Volver al\ninicio" align="center" color="#FFFFFF" width="2"></a-text>
        </a-circle>
      </a-entity>
    </a-entity>

    <a-entity id="contenedorBoton" position="0 1.6 -3" scale="1 1 1" visible="true">
      <a-circle id="btnAccion" class="clickable" color="#000000" opacity="0.8" radius="0.65"
                animation__pulse="property: scale; to: 1.1 1.1 1.1; dur: 1000; dir: alternate; loop: true">
        <a-text id="textoBoton" value="CONOCE NUESTRA\nHISTORIA" align="center" color="#FFFFFF" width="3"></a-text>
      </a-circle>
    </a-entity>

    <a-entity id="rig">
      <a-camera look-controls wasd-controls position="0 1.6 0"></a-camera>
      <a-entity laser-controls="hand: left" raycaster="objects: .clickable; far: 10"></a-entity>
      <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 10"></a-entity>
    </a-entity>
  </a-scene>

  <script>
    const video = document.querySelector('#videoUni');
    const auroraVid = document.querySelector('#auroraVideo');
    const grupoVideo = document.querySelector('#grupoVideo');
    const contenedorBtn = document.querySelector('#contenedorBoton');
    const telon = document.querySelector('#telonNegro');
    const txtPausa = document.querySelector('#txtPausa');
    const barraProgreso = document.querySelector('#barraProgreso');
    const textoDuracion = document.querySelector('#textoDuracion');
    const auroraCielo = document.querySelector('#auroraCielo');

    let DURACION_TOTAL = 0;
    const ANCHO_BARRA = 5;

    function formatearTiempo(segundos) {
      const min = Math.floor(segundos / 60);
      const seg = Math.floor(segundos % 60);
      return `${min}:${seg.toString().padStart(2, '0')}`;
    }

    video.addEventListener('loadedmetadata', () => {
      DURACION_TOTAL = video.duration;
    });

    function actualizarInterfaz() {
      if (!DURACION_TOTAL || video.paused) return;
      const tiempoActual = video.currentTime;
      const progreso = tiempoActual / DURACION_TOTAL;
      barraProgreso.setAttribute('width', Math.max(0.01, progreso * ANCHO_BARRA));
      barraProgreso.setAttribute('position', `${-2.5 + (progreso * ANCHO_BARRA) / 2} -1.6 0.02`);
      textoDuracion.setAttribute('value', `${formatearTiempo(tiempoActual)} / ${formatearTiempo(DURACION_TOTAL)}`);
      requestAnimationFrame(actualizarInterfaz);
    }

    video.addEventListener('timeupdate', actualizarInterfaz);

    document.querySelector('#btnAccion').addEventListener('click', () => {
      contenedorBtn.setAttribute('visible', 'false');
      telon.emit('cineStart'); 
      grupoVideo.setAttribute('visible', 'true');
      video.play().then(() => {
          auroraCielo.setAttribute('visible', 'true');
          auroraVid.play(); 
          actualizarInterfaz(); 
      });
    });

    function volverAlMenu() {
      video.pause();
      auroraVid.pause();
      video.currentTime = 0;
      grupoVideo.setAttribute('visible', 'false');
      telon.emit('cineEnd'); 
      auroraCielo.setAttribute('visible', 'false');
      document.querySelector('#textoBoton').setAttribute('value', 'VUELVE A VER\nNUESTRA HISTORIA');
      contenedorBtn.setAttribute('visible', 'true');
    }

    document.querySelector('#btnReset').addEventListener('click', () => {
      video.currentTime = 0;
      video.play();
      txtPausa.setAttribute('value', 'PAUSA');
    });

    document.querySelector('#btnSalir').addEventListener('click', volverAlMenu);
    video.addEventListener('ended', volverAlMenu);

    document.querySelector('#btnPausa').addEventListener('click', () => {
      if (video.paused) { 
        video.play(); 
        auroraVid.play();
        txtPausa.setAttribute('value', 'PAUSA');
        actualizarInterfaz(); 
      } else { 
        video.pause(); 
        auroraVid.pause();
        txtPausa.setAttribute('value', 'PLAY'); 
      }
    });

    document.querySelector('#btnNormal').addEventListener('click', () => video.playbackRate = 1);
    document.querySelector('#btnRapido').addEventListener('click', () => video.playbackRate = 4);
  </script>
</body>
</html>
